# Auto-update AziNews + Deploy to GitHub Pages
name: AziNews Update & Deploy

on:
  schedule:
    - cron: '42 * * * *'  # Every hour at minute 42
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 requests

      - name: Update news
        run: |
          python3 update_news.py
          python3 generate_rss.py

      - name: Commit and push news files only
        run: |
          git config --local user.email "garconaibot@gmail.com"
          git config --local user.name "GitHub Actions"
          git fetch origin master
          git add all_news.json feed.xml 2>/dev/null
          git diff --staged --quiet || git commit -m "Auto-update news: $(date)"
          git push origin master:master || true

  deploy-to-gh-pages:
    needs: update-news
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Inject GROQ API Key
        run: |
          sed -i "s|GROQ_API_KEY_PLACEHOLDER|${{ secrets.GROQ_API_KEY }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
